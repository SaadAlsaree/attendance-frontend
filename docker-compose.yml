services:
  # Attendance Management Frontend
  attendance-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-frontend
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/health'
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - attendance-network

  # Development service (optional)
  attendance-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: attendance-frontend-dev
    ports:
      - '${DEV_PORT:-3001}:3000'
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - attendance-network

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - attendance-frontend
    restart: unless-stopped
    profiles:
      - production
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  node_modules:
  next_cache:
