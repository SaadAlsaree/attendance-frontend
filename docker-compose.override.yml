# Development override configuration
# This file is automatically loaded by docker-compose for development

services:
  attendance-frontend:
    build:
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    command: ['npm', 'run', 'dev']
